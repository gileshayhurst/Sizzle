services:
  - type: web
    name: sizzle-app
    runtime: docker
    dockerfilePath: ./Dockerfile.app
    plan: free
    envVars:
      - key: APP_MODE
        value: cloud
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GENERATOR_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      # Shared token-signing key — MUST be the same value on both services so
      # each can validate tokens the other issued. Set in the Render dashboard.
      - key: SIZZLE_SECRET_KEY
        sync: false

  - type: web
    name: sizzle-generator
    runtime: docker
    dockerfilePath: ./Dockerfile.generator
    plan: free
    envVars:
      - key: APP_MODE
        value: cloud
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      # Must match sizzle-app's SIZZLE_SECRET_KEY (shared token validation).
      - key: SIZZLE_SECRET_KEY
        sync: false
