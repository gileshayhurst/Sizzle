services:
  - type: web
    name: sizzle-app
    runtime: docker
    dockerfilePath: ./Dockerfile.app
    plan: free
    envVars:
      - key: APP_MODE
        value: cloud
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GENERATOR_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false

  - type: web
    name: sizzle-generator
    runtime: docker
    dockerfilePath: ./Dockerfile.generator
    plan: free
    envVars:
      - key: APP_MODE
        value: cloud
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      # Comma-separated frontend origin(s) allowed for cross-origin requests.
      # Leave unset to keep CORS permissive (e.g. local/dev).
      - key: ALLOWED_ORIGINS
        sync: false
